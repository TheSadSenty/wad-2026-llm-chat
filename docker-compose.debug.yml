services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8978:8978'
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - app_network
    restart: unless-stopped

volumes:
  cloudbeaver_data:
