<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.92);
            --text: #1f1a17;
            --muted: #6c5f56;
            --accent: #b84c2a;
            --accent-dark: #8f3113;
            --error: #9f1d35;
            --success: #196347;
            --border: rgba(31, 26, 23, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(184, 76, 42, 0.22), transparent 28rem),
                radial-gradient(circle at bottom right, rgba(25, 99, 71, 0.18), transparent 30rem),
                linear-gradient(135deg, #f7f1e8, #efe4d4);
            color: var(--text);
            font-family: Georgia, 'Times New Roman', serif;
        }

        main {
            width: min(100%, 28rem);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 26, 23, 0.12);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 0.95;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            font: inherit;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 14px 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font: inherit;
            cursor: pointer;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
        }

        .message.error {
            background: rgba(159, 29, 53, 0.08);
            color: var(--error);
        }

        .message.success {
            background: rgba(25, 99, 71, 0.09);
            color: var(--success);
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }

        .link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 14px 18px;
            color: var(--text);
            text-decoration: none;
        }

        .oauth-link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(31, 26, 23, 0.18);
            border-radius: 999px;
            padding: 14px 18px;
            background: #161b22;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main>
    <h1>Create account</h1>
    <p>Register with a unique email address and password.</p>

    {% if error_message %}
    <div class="message error" id="auth-error">{{ error_message }}</div>
    {% else %}
    <div class="message error" id="auth-error" hidden></div>
    {% endif %}

    {% if success_message %}
    <div class="message success" id="auth-success">{{ success_message }}</div>
    {% else %}
    <div class="message success" id="auth-success" hidden></div>
    {% endif %}

    <form id="register-form" method="post" action="/api/auth/register">
        <label>
            Email
            <input type="email" name="login" value="{{ login }}" required autocomplete="email">
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="new-password">
        </label>
        <button type="submit">Register</button>
    </form>

    <div class="actions">
        {% if github_oauth_enabled %}
        <a class="oauth-link" href="/api/auth/github/login">Sign up with GitHub</a>
        {% endif %}
        <a class="link" href="/login">Already registered? Log in</a>
    </div>
</main>
<script>
    (() => {
        const registerForm = document.getElementById('register-form');
        const errorNode = document.getElementById('auth-error');
        const successNode = document.getElementById('auth-success');
        const accessTokenKey = 'llm_chat.access_token';
        const refreshTokenKey = 'llm_chat.refresh_token';

        if (hasStoredTokens()) {
            window.location.replace('/chats');
        }

        registerForm.addEventListener('submit', (event) => {
            event.preventDefault();
            void submitRegistration();
        });

        async function submitRegistration() {
            const submitButton = registerForm.querySelector('button[type="submit"]');
            const formData = new FormData(registerForm);
            const payload = {
                login: String(formData.get('login') || '').trim(),
                password: String(formData.get('password') || ''),
            };

            hideMessages();
            submitButton.disabled = true;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(String(body.detail || 'Registration failed.'));
                }

                storeTokens(body);
                successNode.textContent = 'Account created. Redirecting to chats...';
                successNode.hidden = false;
                window.location.replace('/chats');
            } catch (error) {
                errorNode.textContent = String(error.message || error);
                errorNode.hidden = false;
            } finally {
                submitButton.disabled = false;
            }
        }

        function hasStoredTokens() {
            return Boolean(localStorage.getItem(accessTokenKey) || localStorage.getItem(refreshTokenKey));
        }

        function storeTokens(tokens) {
            if (tokens.access_token) {
                localStorage.setItem(accessTokenKey, tokens.access_token);
            }
            if (tokens.refresh_token) {
                localStorage.setItem(refreshTokenKey, tokens.refresh_token);
            }
        }

        function hideMessages() {
            errorNode.textContent = '';
            errorNode.hidden = true;
            successNode.textContent = '';
            successNode.hidden = true;
        }
    })();
</script>
</body>
</html>
