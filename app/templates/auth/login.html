<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.92);
            --text: #1f1a17;
            --muted: #6c5f56;
            --accent: #196347;
            --accent-dark: #0f4934;
            --error: #9f1d35;
            --border: rgba(31, 26, 23, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top right, rgba(25, 99, 71, 0.24), transparent 28rem),
                radial-gradient(circle at bottom left, rgba(184, 76, 42, 0.18), transparent 32rem),
                linear-gradient(145deg, #f6efe4, #eadfce);
            color: var(--text);
            font-family: Georgia, 'Times New Roman', serif;
        }

        main {
            width: min(100%, 28rem);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 26, 23, 0.12);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 0.95;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            font: inherit;
        }

        button,
        a.link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            text-decoration: none;
        }

        button {
            border: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            cursor: pointer;
        }

        a.link {
            border: 1px solid var(--border);
            color: var(--text);
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(159, 29, 53, 0.08);
            color: var(--error);
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<main>
    <h1>Welcome back</h1>
    <p>Sign in to continue chatting with the mocked assistant.</p>

    {% if error_message %}
    <div class="message">{{ error_message }}</div>
    {% endif %}

    <form method="post" action="/login">
        <label>
            Email
            <input type="email" name="login" value="{{ login }}" required autocomplete="email">
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Login</button>
    </form>

    <div class="actions">
        <a class="link" href="/register">Create a new account</a>
    </div>
</main>
</body>
</html>
