<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe6;
            --panel: rgba(255, 251, 245, 0.92);
            --text: #1f1a17;
            --muted: #6c5f56;
            --accent: #196347;
            --accent-dark: #0f4934;
            --error: #9f1d35;
            --border: rgba(31, 26, 23, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top right, rgba(25, 99, 71, 0.24), transparent 28rem),
                radial-gradient(circle at bottom left, rgba(184, 76, 42, 0.18), transparent 32rem),
                linear-gradient(145deg, #f6efe4, #eadfce);
            color: var(--text);
            font-family: Georgia, 'Times New Roman', serif;
        }

        main {
            width: min(100%, 28rem);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(31, 26, 23, 0.12);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            line-height: 0.95;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.8);
            font: inherit;
        }

        button,
        a.link,
        a.oauth-link {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 999px;
            padding: 14px 18px;
            font: inherit;
            text-decoration: none;
        }

        button {
            border: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            cursor: pointer;
        }

        a.link {
            border: 1px solid var(--border);
            color: var(--text);
        }

        a.oauth-link {
            gap: 10px;
            border: 1px solid rgba(31, 26, 23, 0.18);
            background: #161b22;
            color: #fff;
        }

        .divider {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .divider::before,
        .divider::after {
            content: '';
            height: 1px;
            background: var(--border);
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(159, 29, 53, 0.08);
            color: var(--error);
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<main>
    <h1>Welcome back</h1>
    <p>Sign in to continue chatting with the local assistant.</p>

    {% if error_message %}
    <div class="message" id="auth-message">{{ error_message }}</div>
    {% else %}
    <div class="message" id="auth-message" hidden></div>
    {% endif %}

    <form id="login-form" method="post" action="/api/auth/login">
        <label>
            Email
            <input type="email" name="login" value="{{ login }}" required autocomplete="email">
        </label>
        <label>
            Password
            <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Login</button>
    </form>

    <div class="actions">
        {% if github_oauth_enabled %}
        <div class="divider">or</div>
        <a class="oauth-link" href="/api/auth/github/login">Continue with GitHub</a>
        {% endif %}
        <a class="link" href="/register">Create a new account</a>
    </div>
</main>
<script>
    (() => {
        const loginForm = document.getElementById('login-form');
        const messageNode = document.getElementById('auth-message');
        const accessTokenKey = 'llm_chat.access_token';
        const refreshTokenKey = 'llm_chat.refresh_token';

        captureTokensFromQuery();
        if (hasStoredTokens()) {
            window.location.replace('/chats');
        }

        loginForm.addEventListener('submit', (event) => {
            event.preventDefault();
            void submitLogin();
        });

        async function submitLogin() {
            const submitButton = loginForm.querySelector('button[type="submit"]');
            const formData = new FormData(loginForm);
            const payload = {
                login: String(formData.get('login') || '').trim(),
                password: String(formData.get('password') || ''),
            };

            hideMessage();
            submitButton.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                const body = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(String(body.detail || 'Login failed.'));
                }

                storeTokens(body);
                window.location.replace('/chats');
            } catch (error) {
                showMessage(String(error.message || error));
            } finally {
                submitButton.disabled = false;
            }
        }

        function captureTokensFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            if (!accessToken || !refreshToken) {
                return;
            }

            storeTokens({
                access_token: accessToken,
                refresh_token: refreshToken,
            });
            window.location.replace('/chats');
        }

        function hasStoredTokens() {
            return Boolean(localStorage.getItem(accessTokenKey) || localStorage.getItem(refreshTokenKey));
        }

        function storeTokens(tokens) {
            if (tokens.access_token) {
                localStorage.setItem(accessTokenKey, tokens.access_token);
            }
            if (tokens.refresh_token) {
                localStorage.setItem(refreshTokenKey, tokens.refresh_token);
            }
        }

        function showMessage(message) {
            messageNode.textContent = message;
            messageNode.hidden = false;
        }

        function hideMessage() {
            messageNode.textContent = '';
            messageNode.hidden = true;
        }
    })();
</script>
</body>
</html>
