services:
  prestart:
    build:
      context: .
    env_file:
      - .env
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: >
      sh -c "alembic upgrade head"
    environment:
      LLM_CHAT_DATABASE__POSTGRES__HOST: db

  backend:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
      redis:
        condition: service_started
    environment:
      LLM_CHAT_APP__HOST: 0.0.0.0
      LLM_CHAT_APP__PORT: 8000
      LLM_CHAT_DATABASE__POSTGRES__HOST: db
      LLM_CHAT_REDIS__HOST: redis
    ports:
      - '8000:8000'
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: postgres:17-alpine
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LLM_CHAT_DATABASE__POSTGRES__USER} -d ${LLM_CHAT_DATABASE__POSTGRES__DBNAME}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_DB=${LLM_CHAT_DATABASE__POSTGRES__DBNAME}
      - POSTGRES_PASSWORD=${LLM_CHAT_DATABASE__POSTGRES__PASSWORD}
      - POSTGRES_USER=${LLM_CHAT_DATABASE__POSTGRES__USER}

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
